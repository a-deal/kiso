# Sleep Foundation Protocol
# 4-week progressive sleep optimization for new users
# Generic — no personal references or advanced supplements

name: Sleep Foundation
description: >
  A 4-week protocol to establish consistent, high-quality sleep. Focuses on
  the five highest-leverage sleep habits backed by evidence. Suitable for
  anyone regardless of current sleep quality.

target_bedtime: "22:30"
target_waketime: "06:30"

habits:
  - id: consistent_bedtime
    label: Consistent bed/wake time
    priority: 1
    offset_from: bed
    offset_minutes: 0
    why: >
      Sleep regularity is more predictive of mortality than sleep duration.
      A consistent schedule synchronizes your circadian clock so melatonin
      release, cortisol suppression, and core body temperature drop all
      happen at the right times. Aim for the same bed and wake time within
      30 minutes, including weekends.
    nudge: "Same bedtime tonight, even on weekends."

  - id: am_sunlight
    label: Morning sunlight (10 min)
    priority: 2
    offset_from: wake
    offset_minutes: 30
    why: >
      Bright light within an hour of waking is the strongest signal to
      your circadian clock. It suppresses melatonin, triggers a cortisol
      pulse for daytime alertness, and sets up the evening melatonin
      release 14-16 hours later. Overcast days still deliver 10x indoor
      light levels.
    nudge: "10 min outside within 1 hour of waking."

  - id: caffeine_cutoff
    label: No caffeine after 2pm
    priority: 3
    offset_from: fixed
    fixed_time: "14:00"
    why: >
      Caffeine has a half-life of 5-6 hours. A 2pm coffee means 25% is
      still active at 10pm. It blocks adenosine (sleep pressure) and
      reduces deep sleep even if you fall asleep normally. Moving the
      cutoff earlier is better, but 2pm is a practical starting point.
    nudge: "No coffee, tea, or energy drinks after 2pm."

  - id: cool_dark_room
    label: Cool & dark bedroom
    priority: 4
    offset_from: bed
    offset_minutes: -60
    why: >
      Your body needs to drop core temperature by ~1C to initiate sleep.
      A room at 65-68F supports this. Darkness triggers melatonin release.
      Even small light sources (phone charging, standby LEDs) can suppress
      melatonin by 50%. Blackout curtains + cool room = the cheapest sleep
      upgrade.
    nudge: "Set thermostat to 67F and dim lights 1 hour before bed."

  - id: screen_cutoff
    label: Screens off 30 min before bed
    priority: 5
    offset_from: bed
    offset_minutes: -30
    why: >
      Blue light from screens suppresses melatonin, but the bigger issue
      is cognitive arousal — email, social media, and news activate your
      brain when it should be winding down. Even with a blue light filter,
      the content keeps you alert. Replace screens with reading, stretching,
      or conversation.
    nudge: "Phone down 30 min before bed."

outcome_metrics:
  - id: sleep_duration_avg
    source: garmin
    target: 7.0
    unit: hours
  - id: sleep_regularity_stddev
    source: garmin
    target: 45
    direction: lower_is_better
    unit: min

phases:
  - name: "Getting started"
    weeks: [1, 2]
    focus: "Lock in bedtime consistency and morning light. Don't try to be perfect — just start the habits."
  - name: "Building momentum"
    weeks: [3, 4]
    focus: "Habits should feel more natural. Focus on the ones you're still missing and watch your sleep duration trend."
